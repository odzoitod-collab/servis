<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRL Team • Сервисы</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #09090b;
            --bg2: #000000;
            --text: #f4f4f5;
            --hint: #a1a1aa;
            --accent: #d4d4d8;
            --accent-bright: #ffffff;
            --accent-light: rgba(255, 255, 255, 0.08);
            --metal: linear-gradient(145deg, #18181b 0%, #0f0f11 50%, #09090b 100%);
            --metal-border: 1px solid rgba(255, 255, 255, 0.08);
            --metal-shine: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
            --card-bg: #0f0f11;
            
            /* Технологичные приглушенные цвета для иконок сервисов */
            --green: #34d399;
            --green-light: rgba(52, 211, 153, 0.1);
            --purple: #a78bfa;
            --purple-light: rgba(167, 139, 250, 0.1);
            --pink: #f472b6;
            --pink-light: rgba(244, 114, 182, 0.1);
            --orange: #fb923c;
            --orange-light: rgba(251, 146, 60, 0.1);
            --blue: #38bdf8;
            --blue-light: rgba(56, 189, 248, 0.1);

            --radius: 16px;
            --radius-sm: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.6);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-body); background: var(--bg2); color: var(--text); min-height: 100vh; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }

        .header { background: rgba(15, 15, 17, 0.8); backdrop-filter: blur(10px); padding: 16px 20px; display: flex; align-items: center; gap: 14px; border-bottom: var(--metal-border); }
        .header-avatar { width: 48px; height: 48px; border-radius: 12px; background: var(--bg2); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .header-avatar svg { width: 24px; height: 24px; color: var(--accent-bright); }
        .header-info { flex: 1; min-width: 0; }
        .header-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
        .header-sub { font-size: 12px; color: var(--hint); margin-top: 4px; display: flex; align-items: center; gap: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .header-badge { background: rgba(255,255,255,0.1); color: var(--accent-bright); padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.05); }
        
        .tabs { display: flex; background: rgba(15, 15, 17, 0.8); backdrop-filter: blur(10px); padding: 12px 16px; gap: 8px; position: sticky; top: 0; z-index: 10; border-bottom: var(--metal-border); }
        .tab { flex: 1; padding: 12px 16px; text-align: center; font-size: 13px; font-weight: 600; color: var(--hint); background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; border: var(--metal-border); font-family: var(--font-body); }
        .tab svg { width: 18px; height: 18px; opacity: 0.7; transition: 0.2s; }
        .tab.active { background: rgba(255,255,255,0.1); color: var(--accent-bright); border-color: rgba(255,255,255,0.2); }
        .tab.active svg { color: var(--accent-bright); opacity: 1; }
        .tab-badge { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        
        .section { padding: 0 16px; }
        .section-title { font-family: var(--font-body); font-size: 12px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.05em; margin: 24px 0 12px 4px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .section-hint { font-size: 11px; font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--accent-bright); opacity: 0.6; }
        
        .service-list { margin: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
        .service-list .list-item {
            display: flex; align-items: center; padding: 16px 18px; gap: 14px;
            cursor: pointer; transition: all 0.2s ease;
            border: var(--metal-border); border-radius: var(--radius);
            background: var(--card-bg); box-shadow: var(--shadow);
            width: 100%; text-align: left; font: inherit; color: inherit;
            -webkit-tap-highlight-color: transparent;
            position: relative; overflow: hidden;
        }
        .service-list .list-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            opacity: 0.4; border-radius: 3px 0 0 3px; transition: 0.2s;
        }
        .service-list .list-item:active {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.2);
            transform: scale(0.99);
        }
        .service-list .list-item:active::before { opacity: 0.8; }
        .service-list .list-item:active .item-arrow { color: var(--accent-bright); }
        
        .item-icon.service-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .item-icon.service-icon.purple { background: var(--purple-light); }
        .item-icon.service-icon.green { background: var(--green-light); }
        .item-icon.service-icon.pink { background: var(--pink-light); }
        .item-icon.service-icon.orange { background: var(--orange-light); }
        .item-icon.service-icon.blue { background: var(--blue-light); }
        
        .service-list .item-content { flex: 1; min-width: 0; }
        .service-list .item-title { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .service-list .item-sub { font-size: 13px; color: var(--hint); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 400; }
        .service-list .item-arrow { color: var(--accent-bright); opacity: 0.5; flex-shrink: 0; display: flex; align-items: center; transition: color 0.2s, transform 0.2s; }
        .service-list .item-arrow svg { width: 22px; height: 22px; }
        .service-list .list-item:active .item-arrow svg { transform: translateX(2px); }

        .list { margin: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
        .list .list-item {
            display: flex; align-items: center; padding: 16px 18px; gap: 14px;
            cursor: pointer; transition: all 0.2s ease; text-decoration: none; color: inherit;
            border: var(--metal-border); border-radius: var(--radius);
            background: var(--card-bg); box-shadow: var(--shadow);
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .list .list-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            opacity: 0.3; border-radius: 3px 0 0 3px;
        }
        .list .list-item:active {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.2);
            transform: scale(0.99);
        }
        .list .list-item:active .item-arrow { color: var(--accent-bright); }
        
        .item-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
        .item-icon svg { width: 20px; height: 20px; }
        .item-icon.resource { background: var(--green-light); color: var(--green); border-color: rgba(52,211,153,0.2); }
        .item-icon.community { background: var(--pink-light); color: var(--pink); border-color: rgba(244,114,182,0.2); }
        
        .item-content { flex: 1; min-width: 0; }
        .item-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
        .item-sub { font-size: 12px; color: var(--hint); margin-top: 4px; font-weight: 500; }
        .list .item-arrow { color: var(--accent-bright); opacity: 0.5; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; transition: color 0.2s, transform 0.2s; }
        .list .item-arrow svg { width: 20px; height: 20px; }
        .list .list-item:active .item-arrow svg { transform: translateX(2px); }
        
        .empty { text-align: center; padding: 60px 20px; }
        .empty-icon { width: 64px; height: 64px; margin: 0 auto 20px; background: rgba(255,255,255,0.02); border: var(--metal-border); border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .empty-icon svg { width: 28px; height: 28px; color: var(--hint); opacity: 0.7; }
        .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        .empty-text { font-size: 13px; color: var(--hint); max-width: 240px; margin: 0 auto; line-height: 1.5; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; opacity: 0; visibility: hidden; transition: all 0.25s; backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { position: fixed; bottom: 0; left: 0; right: 0; max-height: 85vh; background: var(--bg); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; display: flex; flex-direction: column; border: var(--metal-border); border-bottom: none; box-shadow: 0 -8px 40px rgba(0,0,0,0.8); }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal-handle { width: 36px; height: 4px; background: var(--hint); opacity: 0.4; border-radius: 2px; margin: 12px auto 8px; flex-shrink: 0; }
        .modal-body { flex: 1; overflow-y: auto; padding: 0 20px 30px; }
        
        .detail-header { text-align: center; padding: 20px 0 24px; }
        .detail-icon { width: 72px; height: 72px; border-radius: 16px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; border: 1px solid rgba(255,255,255,0.1); }
        .detail-icon.purple { background: var(--purple-light); }
        .detail-icon.green { background: var(--green-light); }
        .detail-icon.pink { background: var(--pink-light); }
        .detail-icon.orange { background: var(--orange-light); }
        .detail-icon.blue { background: var(--blue-light); }
        .detail-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
        .detail-desc { font-size: 14px; color: var(--hint); margin-top: 12px; line-height: 1.6; max-width: 320px; margin-left: auto; margin-right: auto; }
        
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 600; text-decoration: none; margin-top: 12px; transition: all 0.2s; cursor: pointer; font-family: var(--font-body); }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%); color: var(--accent-bright); border: 1px solid rgba(255,255,255,0.2); }
        .btn-primary:active { background: rgba(255,255,255,0.15); }
        .btn-secondary { background: rgba(255,255,255,0.03); color: var(--text); border: var(--metal-border); }
        .btn-secondary:active { background: rgba(255,255,255,0.08); }
        .btn svg { width: 18px; height: 18px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .loader { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .loader.hidden { display: none; }
        .spinner { width: 40px; height: 40px; border: 2px solid var(--card-bg); border-top-color: var(--accent-bright); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--hint); }
    </style>
</head>
<body>
    <div class="header" id="header"></div>
    <div class="tabs" id="tabs"></div>
    <div id="services" class="tab-content active"></div>
    <div id="resources" class="tab-content"></div>
    <div id="community" class="tab-content"></div>
    <div class="modal-overlay" id="modal"><div class="modal"><div class="modal-handle"></div><div class="modal-body" id="modalBody"></div></div></div>
    <div class="loader" id="loader"><div class="spinner"></div><div class="loader-text">Синхронизация</div></div>

<script>
    // SVG Icons
    const ICONS = {
        globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
        tool: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
        book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
        users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        message: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
        bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>',
        externalLink: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
        chevronRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>',
        inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>'
    };
    
    const SERVICE_COLORS = ['purple', 'green', 'pink', 'orange', 'blue'];
    
    const SUPABASE_URL = 'https://sqoehqvvrbbgaqvkniyw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxb2VocXZ2cmJiZ2FxdmtuaXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5ODkzODUsImV4cCI6MjA4MjU2NTM4NX0.-Qam5GFLwzFCvM2MrEYv3HbLeRYUPOLPnLRqcLPcasg';
    
    let db, tg;
    try { db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}
    try { 
        tg = window.Telegram?.WebApp; 
        if(tg) { 
            tg.ready(); 
            tg.expand(); 
            tg.setHeaderColor('#09090b'); // Обновлено
            tg.setBackgroundColor('#000000');

    let services = [], resources = [];

<script>
    // Header
    document.getElementById('header').innerHTML = `
        <div class="header-avatar">${ICONS.globe}</div>
        <div class="header-info">
            <div class="header-title">IRL Team</div>
            <div class="header-sub">
                <span>Хаб ресурсов</span>
                <span class="header-badge">Hub</span>
            </div>
        </div>
    `;
    
    // Tabs
    document.getElementById('tabs').innerHTML = `
        <div class="tab active" data-tab="services">${ICONS.tool} Сервисы</div>
        <div class="tab" data-tab="resources">${ICONS.book} Ресурсы</div>
        <div class="tab" data-tab="community">${ICONS.users} Чаты</div>
    `;
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            if(tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        };
    });
    
    async function load() {
        if (!db) { document.getElementById('loader').classList.add('hidden'); return; }
        
        const [sRes, rRes] = await Promise.all([
            db.from('services').select('*').eq('is_active', true).order('name'),
            db.from('resources').select('*').eq('is_active', true).order('type').order('title')
        ]);
        
        services = sRes.data || [];
        resources = rRes.data || [];
        
        document.getElementById('loader').classList.add('hidden');
        render();
    }
    
    function render() {
        // Services
        const servicesEl = document.getElementById('services');
        if (!services.length) {
            servicesEl.innerHTML = `<div class="section"><div class="empty"><div class="empty-icon">${ICONS.tool}</div><div class="empty-title">Нет сервисов</div><div class="empty-text">Сервисы появятся здесь после добавления</div></div></div>`;
        } else {
            servicesEl.innerHTML = `
                <div class="section"><div class="section-title">Сервисы <span class="section-hint">нажмите для подробностей</span></div></div>
                <div class="service-list">${services.map((s, i) => {
                    const colorClass = SERVICE_COLORS[i % SERVICE_COLORS.length];
                    const desc = (s.description || '').trim();
                    const shortDesc = desc.length > 80 ? desc.slice(0, 80) + '…' : desc;
                    return `
                    <button type="button" class="list-item" onclick='showService(${JSON.stringify(s).replace(/'/g, "&#39;")}, "${colorClass}")'>
                        <div class="item-icon service-icon ${colorClass}">${s.icon || '🔹'}</div>
                        <div class="item-content">
                            <div class="item-title">${(s.name || '').replace(/</g, '&lt;')}</div>
                            ${shortDesc ? `<div class="item-sub">${shortDesc.replace(/</g, '&lt;')}</div>` : ''}
                        </div>
                        <div class="item-arrow">${ICONS.chevronRight}</div>
                    </button>`;
                }).join('')}</div>`;
        }
        
        // Resources
        const resourceItems = resources.filter(r => r.type === 'resource');
        const resourcesEl = document.getElementById('resources');
        if (!resourceItems.length) {
            resourcesEl.innerHTML = `<div class="section"><div class="empty"><div class="empty-icon">${ICONS.book}</div><div class="empty-title">Нет ресурсов</div><div class="empty-text">Материалы появятся здесь после добавления</div></div></div>`;
        } else {
            resourcesEl.innerHTML = `
                <div class="section"><div class="section-title">Материалы и гайды</div></div>
                <div class="list">${resourceItems.map(r => `
                    <a href="${r.content_link}" target="_blank" class="list-item">
                        <div class="item-icon resource">${ICONS.file}</div>
                        <div class="item-content">
                            <div class="item-title">${r.title}</div>
                            <div class="item-sub">Открыть документ</div>
                        </div>
                        <div class="item-arrow">${ICONS.externalLink}</div>
                    </a>
                `).join('')}</div>`;
        }
        
        // Community
        const communityItems = resources.filter(r => r.type === 'community');
        const communityEl = document.getElementById('community');
        if (!communityItems.length) {
            communityEl.innerHTML = `<div class="section"><div class="empty"><div class="empty-icon">${ICONS.users}</div><div class="empty-title">Нет чатов</div><div class="empty-text">Чаты сообщества появятся здесь</div></div></div>`;
        } else {
            communityEl.innerHTML = `
                <div class="section"><div class="section-title">Сообщество</div></div>
                <div class="list">${communityItems.map(r => `
                    <a href="${r.content_link}" target="_blank" class="list-item">
                        <div class="item-icon community">${ICONS.message}</div>
                        <div class="item-content">
                            <div class="item-title">${r.title}</div>
                            <div class="item-sub">Присоединиться</div>
                        </div>
                        <div class="item-arrow">${ICONS.externalLink}</div>
                    </a>
                `).join('')}</div>`;
        }
    }
    
    function showService(s, colorClass) {
        if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        const hasLinks = s.bot_link || s.manual_link;
        document.getElementById('modalBody').innerHTML = `
            <div class="detail-header">
                <div class="detail-icon ${colorClass}">${s.icon || '🔹'}</div>
                <div class="detail-name">${s.name}</div>
                ${s.description ? `<div class="detail-desc">${s.description}</div>` : ''}
            </div>
            ${s.bot_link ? `<a href="${s.bot_link}" target="_blank" class="btn btn-primary">${ICONS.bot} Открыть бота</a>` : ''}
            ${s.manual_link ? `<a href="${s.manual_link}" target="_blank" class="btn btn-secondary">${ICONS.book} Читать мануал</a>` : ''}
            ${!hasLinks ? `<div class="empty" style="padding: 30px;"><div class="empty-icon">${ICONS.inbox}</div><div class="empty-title">Ссылки не добавлены</div></div>` : ''}
        `;
        document.getElementById('modal').classList.add('active');
    }
    
    document.getElementById('modal').onclick = e => { if(e.target.id === 'modal') document.getElementById('modal').classList.remove('active'); };
    if(tg?.BackButton) { tg.BackButton.onClick(() => document.getElementById('modal').classList.remove('active')); }
    
    load();
</script>
</body>
</html>
